name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contracts:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e ".[flashlight]"
      - run: python scripts/verify.py
      - name: Verify LF-pinned HBP sidecars
        run: |
          (cd provenance && sha256sum -c SOURCE-LEDGER.hbp.sha256)
          (cd contracts && sha256sum -c ARCHITECTURE.hbp.sha256)

  source-integrity:
    name: source-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python scripts/verify_reference_hashes.py

  public-receipt-privacy:
    name: public-receipt-privacy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python scripts/verify_public_tree.py
      - run: python scripts/verify_receipt_privacy.py

  rust-reference-suites:
    name: rust-reference-suites (${{ matrix.id }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: floor
            source: reference/omega-floor-codec-v0/omega_floor_codec_v0.rs
            tests: 11
          - id: operator-catalog
            source: reference/omega-operator-catalog-v0/omega_operator_catalog.rs
            tests: 18
          - id: path123
            source: reference/omega-path123-v0/omega_path123.rs
            tests: 35
          - id: hyper-codec
            source: reference/omega-hyper-codec-integration-v0/omega_hyper_codec_v0.rs
            tests: 34
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install the exact Rust 1.81.0 toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.81.0 --profile minimal --no-self-update
          test "$(rustup run 1.81.0 rustc --version | awk '{print $2}')" = 1.81.0
      - name: Verify census and run ${{ matrix.id }}
        shell: bash
        run: |
          set -euo pipefail
          binary="$RUNNER_TEMP/${{ matrix.id }}-tests"
          timeout 10m rustup run 1.81.0 rustc --edition=2021 --test -O "${{ matrix.source }}" -o "$binary"
          count=$("$binary" --list | awk -F: '$NF ~ / test$/ {n++} END {print n+0}')
          test "$count" -eq "${{ matrix.tests }}"
          timeout 10m "$binary" --nocapture

  evidence-gate:
    name: evidence-gate
    if: ${{ always() }}
    needs:
      - contracts
      - source-integrity
      - public-receipt-privacy
      - rust-reference-suites
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every owning evidence job
        env:
          CONTRACTS_RESULT: ${{ needs.contracts.result }}
          SOURCE_RESULT: ${{ needs.source-integrity.result }}
          PRIVACY_RESULT: ${{ needs.public-receipt-privacy.result }}
          RUST_RESULT: ${{ needs.rust-reference-suites.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "$CONTRACTS_RESULT" = success
          test "$SOURCE_RESULT" = success
          test "$PRIVACY_RESULT" = success
          test "$RUST_RESULT" = success
