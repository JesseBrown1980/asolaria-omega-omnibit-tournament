name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contracts:
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e ".[flashlight]"
      - run: python scripts/verify.py
